backend:
  name: git-gateway
  branch: main

local_backend:
  url: http://localhost:8082/api/v1
  allowed_hosts:
    - localhost

media_folder: "public/assets/uploads"
public_folder: "/assets/uploads"

collections:
  - name: "pages"
    label: "Page Content"
    files:
      - file: "content/pages/home.json"
        label: "Homepage"
        name: "home"
        fields:
          - label: "Hero Section"
            name: "hero"
            widget: "object"
            fields:
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Subtitle", name: "subtitle", widget: "string" }
              - { label: "Eyebrow", name: "eyebrow", widget: "string" }
              - { label: "Background Type", name: "backgroundType", widget: "select", options: ["pattern", "image", "color"], default: "pattern" }
              - { label: "Background Color/Pattern", name: "background", widget: "string", required: false }
              - { label: "Accent Color", name: "accent", widget: "select", options: ["volt", "plasma", "chalk"], default: "volt" }
              - { label: "Hero Image", name: "heroImage", widget: "image", required: false, hint: "Upload image. The CMS will handle the path automatically." }
          - { label: "Hero Name (Full Name)", name: "heroName", widget: "string", default: "Kyle De Vares", hint: "Your full name that will be displayed in the hero section" }
          - { label: "Hero Description", name: "heroDescription", widget: "text", default: "Creative digital artist blending branding, illustration, web experiments, and queer punk visual storytelling.", hint: "Short description shown below your name in the hero section" }
          - { label: "Hero Eyebrow", name: "heroEyebrow", widget: "string", default: "Creative Digital Artist", hint: "Small text above your name in the hero section" }
          - label: "Marquee Text"
            name: "marqueeText"
            widget: "list"
            field: { label: "Item", name: "item", widget: "string", hint: "Text that scrolls in the marquee bar" }
          - label: "Featured Project IDs"
            name: "featuredProjectIds"
            widget: "list"
            required: false
            field: { label: "Project Slug", name: "slug", widget: "string", hint: "Enter the slug of projects to feature on homepage (leave empty to show recent projects)" }
          - label: "About Section"
            name: "aboutSection"
            widget: "object"
            fields:
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Image", name: "image", widget: "image", hint: "Upload image. The CMS will handle the path automatically." }
              - { label: "Summary", name: "summary", widget: "text", required: false }
              - label: "Stats"
                name: "stats"
                widget: "list"
                fields:
                  - { label: "Label", name: "label", widget: "string" }
                  - { label: "Number", name: "num", widget: "number" }
          - label: "Featured Section"
            name: "featuredSection"
            widget: "object"
            fields:
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Description", name: "description", widget: "text" }
              - { label: "CTA Label", name: "ctaLabel", widget: "string" }
              - { label: "CTA Link", name: "ctaLink", widget: "string" }
          - label: "What I Do"
            name: "whatIDo"
            widget: "list"
            fields:
              - { label: "Label", name: "label", widget: "string" }
              - { label: "Description", name: "description", widget: "text" }
          - label: "Contact Section"
            name: "contactSection"
            widget: "object"
            fields:
              - { label: "Headline", name: "headline", widget: "string" }
              - { label: "CTA Label", name: "ctaLabel", widget: "string" }
          - label: "Journal Section"
            name: "journalSection"
            widget: "object"
            fields:
              - { label: "Title", name: "title", widget: "string" }
              - { label: "CTA Label", name: "ctaLabel", widget: "string" }
      - file: "content/pages/about.json"
        label: "About Page"
        name: "about"
        fields:
          - label: "Page Hero"
            name: "hero"
            widget: "object"
            fields:
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Subtitle", name: "subtitle", widget: "string" }
              - { label: "Eyebrow", name: "eyebrow", widget: "string" }
              - { label: "Background Type", name: "backgroundType", widget: "select", options: ["pattern", "image", "color"], default: "pattern" }
              - { label: "Background Color/Pattern", name: "background", widget: "string", required: false }
              - { label: "Accent Color", name: "accent", widget: "select", options: ["volt", "plasma", "chalk"], default: "plasma" }
          - { label: "Profile Image", name: "profileImage", widget: "image", required: false, hint: "Upload image. The CMS will handle the path automatically." }
          - { label: "Bio", name: "bio", widget: "markdown", hint: "Your bio text - use double line breaks for paragraphs" }
          - label: "Tags"
            name: "tags"
            widget: "list"
            field: { label: "Tag", name: "tag", widget: "string" }
          - label: "Disciplines/Skills"
            name: "disciplines"
            widget: "list"
            fields:
              - { label: "Label", name: "label", widget: "string" }
              - { label: "Level (%)", name: "level", widget: "number", value_type: "int", min: 0, max: 100 }
          - label: "Timeline"
            name: "timeline"
            widget: "list"
            fields:
              - { label: "Year", name: "year", widget: "string" }
              - { label: "Event", name: "event", widget: "string" }
              - { label: "Detail", name: "detail", widget: "text" }
          - label: "Marquee Items"
            name: "marqueeItems"
            widget: "list"
            field: { label: "Item", name: "item", widget: "string" }
      - file: "content/pages/portfolio.json"
        label: "Portfolio Page"
        name: "portfolio"
        fields:
          - label: "Page Hero"
            name: "hero"
            widget: "object"
            fields:
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Eyebrow", name: "eyebrow", widget: "string" }
              - { label: "Background Type", name: "backgroundType", widget: "select", options: ["pattern", "image", "color"], default: "pattern" }
              - { label: "Background Color/Pattern", name: "background", widget: "string", required: false }
              - { label: "Accent Color", name: "accent", widget: "select", options: ["volt", "plasma", "chalk"], default: "plasma" }
          - label: "Built From Real Work Section"
            name: "builtFromRealWork"
            widget: "object"
            fields:
              - { label: "Headline", name: "headline", widget: "string" }
              - { label: "Description", name: "description", widget: "text" }
      - file: "content/pages/blog.json"
        label: "Blog Page"
        name: "blog"
        fields:
          - label: "Page Hero"
            name: "hero"
            widget: "object"
            fields:
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Eyebrow", name: "eyebrow", widget: "string" }
              - { label: "Background Type", name: "backgroundType", widget: "select", options: ["pattern", "image", "color"], default: "pattern" }
              - { label: "Background Color/Pattern", name: "background", widget: "string", required: false }
              - { label: "Accent Color", name: "accent", widget: "select", options: ["volt", "plasma", "chalk"], default: "volt" }
          - { label: "Page Title", name: "pageTitle", widget: "string" }
          - { label: "Page Description", name: "pageDescription", widget: "text" }
      - file: "content/pages/contact.json"
        label: "Contact Page"
        name: "contact"
        fields:
          - label: "Page Hero"
            name: "hero"
            widget: "object"
            fields:
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Eyebrow", name: "eyebrow", widget: "string" }
              - { label: "Background Type", name: "backgroundType", widget: "select", options: ["pattern", "image", "color"], default: "pattern" }
              - { label: "Background Color/Pattern", name: "background", widget: "string", required: false }
              - { label: "Accent Color", name: "accent", widget: "select", options: ["volt", "plasma", "chalk"], default: "plasma" }
          - { label: "Email", name: "email", widget: "string" }
          - { label: "Availability Status", name: "availability", widget: "string" }
          - label: "Contact Details"
            name: "details"
            widget: "list"
            fields:
              - { label: "Label", name: "label", widget: "string" }
              - { label: "Value", name: "value", widget: "string" }
              - { label: "Icon", name: "icon", widget: "string" }

  - name: "projects"
    label: "Projects"
    label_singular: "Project"
    folder: "content/projects"
    create: true
    delete: true
    slug: "{{slug}}"
    format: "json"
    extension: "json"
    identifier_field: "title"
    summary: "{{title}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Slug", name: "slug", widget: "string", hint: "Used in article URLs, for example community-discord-bot" }
      - { label: "Publish Date", name: "date", widget: "datetime", format: "YYYY-MM-DD", required: false }
      - { label: "Sort Order", name: "order", widget: "number", value_type: "int", min: 0, step: 1, required: false, hint: "Lower numbers appear first when no date is set." }
      - { label: "Card Summary", name: "description", widget: "text", hint: "Short description used on project cards and at the top of the article." }
      - label: "Category"
        name: "category"
        widget: "object"
        fields:
          - { label: "Label", name: "label", widget: "string", hint: "Shown on cards and articles." }
          - { label: "Filter Value", name: "value", widget: "string", hint: "Matches the filter value in site settings, for example graphic-design or coding." }
      - { label: "Featured Image", name: "featuredImage", widget: "image", required: false, hint: "Upload image. The CMS will handle the path automatically. Falls back to the first gallery image if left empty." }
      - label: "Keywords"
        name: "keywords"
        widget: "list"
        required: false
        hint: "Shown as article keyword chips."
        field: { label: "Keyword", name: "keyword", widget: "string" }
      - label: "Styled Text Box"
        name: "highlightBox"
        widget: "object"
        required: false
        collapsed: true
        fields:
          - { label: "Style", name: "style", widget: "select", required: false, options: ["info", "accent", "success", "warning"] }
          - { label: "Title", name: "title", widget: "string", required: false }
          - { label: "Body", name: "body", widget: "text", required: false }
      - label: "Buttons"
        name: "actionButtons"
        widget: "list"
        required: false
        collapsed: true
        hint: "Add external links or downloadable files."
        fields:
          - { label: "Label", name: "label", widget: "string" }
          - { label: "Type", name: "type", widget: "select", options: ["link", "download"], default: "link" }
          - { label: "Style", name: "style", widget: "select", required: false, options: ["primary", "secondary", "ghost"], default: "primary" }
          - { label: "URL", name: "url", widget: "string", required: false, hint: "Use for external pages or direct links." }
          - { label: "File", name: "file", widget: "file", required: false, hint: "Use for downloads or self-hosted files." }
      - label: "Media Gallery"
        name: "mediaGallery"
        widget: "list"
        required: false
        collapsed: true
        hint: "Supports images and self-hosted video files."
        fields:
          - { label: "Media Type", name: "type", widget: "select", options: ["image", "video"], default: "image" }
          - { label: "Image", name: "image", widget: "image", required: false, hint: "Upload image. The CMS will handle the path automatically." }
          - { label: "Video File", name: "video", widget: "file", required: false, hint: "Upload an MP4, WebM, or Ogg file for the custom player." }
          - { label: "External Video URL", name: "videoUrl", widget: "string", required: false, hint: "Optional direct video file URL if the video is hosted elsewhere." }
          - { label: "Poster Image", name: "posterImage", widget: "image", required: false, hint: "Upload image. The CMS will handle the path automatically." }
          - { label: "Caption", name: "caption", widget: "string", required: false }
          - { label: "Alt Text", name: "altText", widget: "string", required: false }
      - { label: "Body", name: "body", widget: "markdown", hint: "Main article content. Use markdown for headings, lists, and inline images." }

  - name: "journal"
    label: "Blog / Journal"
    label_singular: "Post"
    folder: "content/journal"
    create: true
    delete: true
    slug: "{{slug}}"
    format: "json"
    extension: "json"
    identifier_field: "title"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Slug", name: "slug", widget: "string" }
      - { label: "Date", name: "date", widget: "datetime", format: "YYYY-MM-DD" }
      - { label: "Featured Image", name: "featuredImage", widget: "image", required: false, hint: "Upload image. The CMS will handle the path automatically." }
      - { label: "Excerpt", name: "excerpt", widget: "text" }
      - label: "Tags"
        name: "tags"
        widget: "list"
        required: false
        field: { label: "Tag", name: "tag", widget: "string" }
      - label: "Media Gallery"
        name: "mediaGallery"
        widget: "list"
        required: false
        collapsed: true
        hint: "Supports images and self-hosted video files."
        fields:
          - { label: "Media Type", name: "type", widget: "select", options: ["image", "video"], default: "image" }
          - { label: "Image", name: "image", widget: "image", required: false, hint: "Upload image. The CMS will handle the path automatically." }
          - { label: "Video File", name: "video", widget: "file", required: false, hint: "Upload an MP4, WebM, or Ogg file for the custom player." }
          - { label: "External Video URL", name: "videoUrl", widget: "string", required: false, hint: "Optional direct video file URL if the video is hosted elsewhere." }
          - { label: "Poster Image", name: "posterImage", widget: "image", required: false, hint: "Upload image. The CMS will handle the path automatically." }
          - { label: "Caption", name: "caption", widget: "string", required: false }
          - { label: "Alt Text", name: "altText", widget: "string", required: false }
      - { label: "Body", name: "body", widget: "markdown" }

  - name: "galleries"
    label: "Artwork Galleries"
    folder: "content/galleries"
    create: true
    delete: true
    slug: "{{slug}}"
    format: "json"
    extension: "json"
    identifier_field: "title"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Slug", name: "slug", widget: "string" }
      - { label: "Description", name: "description", widget: "text" }
      - label: "Images"
        name: "images"
        widget: "list"
        fields:
          - { label: "Image", name: "image", widget: "image", hint: "Upload image. The CMS will handle the path automatically." }
          - { label: "Alt Text", name: "altText", widget: "string" }
          - { label: "Caption", name: "caption", widget: "string", required: false }

  - name: "skills"
    label: "Skills"
    files:
      - file: "content/coding_skills.json"
        label: "Coding Skills"
        name: "coding_skills"
        fields:
          - label: "Skills"
            name: "skills"
            widget: "list"
            fields:
              - { label: "Name", name: "name", widget: "string" }
              - { label: "Icon", name: "icon", widget: "string" }
              - { label: "Skill ID", name: "skill_id", widget: "string" }
      - file: "content/creative_skills.json"
        label: "Creative Skills"
        name: "creative_skills"
        fields:
          - label: "Skills"
            name: "skills"
            widget: "list"
            fields:
              - { label: "Name", name: "name", widget: "string" }
              - { label: "Icon", name: "icon", widget: "string" }
              - { label: "Skill ID", name: "skill_id", widget: "string" }

  - name: "social"
    label: "Social Links"
    files:
      - file: "content/social_links.json"
        label: "Social Links"
        name: "social_links"
        fields:
          - label: "Links"
            name: "links"
            widget: "list"
            fields:
              - { label: "Name", name: "name", widget: "string" }
              - { label: "Icon", name: "icon", widget: "string" }
              - { label: "URL", name: "url", widget: "string" }
              - { label: "Order", name: "order", widget: "number" }

  - name: "settings"
    label: "Settings"
    files:
      - file: "content/settings/navigation.json"
        label: "Navigation"
        name: "navigation"
        fields:
          - label: "Brand Name"
            name: "brandName"
            widget: "string"
            default: "KYLE"
          - label: "Brand Subtitle"
            name: "brandSubtitle"
            widget: "string"
            default: "Digital Artist"
          - label: "Navigation Links"
            name: "links"
            widget: "list"
            fields:
              - { label: "Label", name: "label", widget: "string" }
              - { label: "Href", name: "href", widget: "string" }
          - label: "CTA Button"
            name: "cta"
            widget: "object"
            fields:
              - { label: "Label", name: "label", widget: "string", default: "Let's Talk" }
              - { label: "Href", name: "href", widget: "string", default: "/contact" }
      - file: "content/settings/footer.json"
        label: "Footer"
        name: "footer"
        fields:
          - label: "Brand Name"
            name: "brandName"
            widget: "string"
            default: "KYLE"
          - label: "Brand Description"
            name: "brandDescription"
            widget: "text"
            default: "Creative digital artist building bold custom visuals, identity work, web experiments, and commission-ready design."
          - label: "CTA Headline"
            name: "ctaHeadline"
            widget: "string"
            default: "Let's make something unforgettable"
          - label: "CTA Button Label"
            name: "ctaLabel"
            widget: "string"
            default: "Start a project"
          - label: "Navigation Links"
            name: "navLinks"
            widget: "list"
            fields:
              - { label: "Label", name: "label", widget: "string" }
              - { label: "Href", name: "href", widget: "string" }
          - label: "Social Links"
            name: "socialLinks"
            widget: "list"
            fields:
              - { label: "Label", name: "label", widget: "string" }
              - { label: "Short Code", name: "short", widget: "string", hint: "2-3 character code (e.g., IG, LI, GH)" }
              - { label: "URL", name: "url", widget: "string" }
          - label: "Copyright Text"
            name: "copyright"
            widget: "string"
            default: "Built with rebellion & Next.js"
